<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>What do you think about Solstice?</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="page">

  <div class="identity-wrap">
    <div class="identity-bar">
      <button class="pfp-upload" id="pfpButton" title="Add profile picture" type="button">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="3.2"/><path d="M5 20c0-3.5 3-6 7-6s7 2.5 7 6"/></svg>
      </button>
      <input type="file" id="pfpInput" accept="image/*" style="display:none;">
      <div class="username-field">
        <span class="username-at">@</span>
        <input type="text" class="username-input" id="usernameInput" placeholder="username" maxlength="15">
      </div>
      <button class="btn-connect" id="connectBtn" disabled>Submit</button>
    </div>
  </div>

  <h1 class="title">What do you think<br/>about Solstice?</h1>
  <p class="subtitle">200 takes max · one per account</p>

  <div class="composer">
    <textarea class="composer-input" id="textInput" maxlength="200" placeholder="Tell us who you are to share your take…" disabled></textarea>
    <div class="composer-footer">
      <span class="char-count" id="charCount">0 / 200</span>
      <button class="btn-submit" id="submitBtn" disabled>Post take</button>
    </div>
  </div>

  <p class="status-line" id="statusLine"></p>

  <div class="feed-panel" id="feedPanel">
    <!-- 5 marquee rows injected by script.js -->
  </div>

</div>

<script type="module" src="script.js"></script>

</body>
</html>
